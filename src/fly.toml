app = "shopisel-stores-fly"
primary_region = "fra"

[build]
  dockerfile = "StoresService/Dockerfile"

[env]
  ASPNETCORE_FORWARDEDHEADERS_ENABLED = "true"
  ASPNETCORE_URLS = "http://+:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.http_checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "2s"
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
