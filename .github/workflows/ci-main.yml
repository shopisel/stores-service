name: CI - Main (Build, Test, Sonar & Deploy)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: stores-service-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  packages: write

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/shopisel/stores-service

    defaults:
      run:
        working-directory: src

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore

    - name: Begin SonarCloud analysis
      run: |
        dotnet sonarscanner begin \
          /k:"shopisel_stores-service" \
          /o:"shopisel" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="TestResults/coverage.opencover.xml"

    - name: Build
      run: dotnet build --no-restore

    - name: Test with coverage
      run: |
        dotnet test --no-build --verbosity normal \
          /p:CollectCoverage=true \
          /p:CoverletOutput=./TestResults/coverage.opencover.xml \
          /p:CoverletOutputFormat=opencover

    - name: End SonarCloud analysis
      run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v6
      with:
        context: src
        file: src/StoresService/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.IMAGE_NAME }}:latest

    - name: Set up Flyctl
      if: github.event_name == 'push'
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Deploy to Fly.io
      if: github.event_name == 'push'
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      run: flyctl deploy --image ${{ env.IMAGE_NAME }}:${{ github.sha }}
